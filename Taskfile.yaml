version: '3'
tasks:
  default:
    desc: "Install Neovim + LazyVim"
    cmds:
      - task: install-deps
      - task: install-lazygit
      - task: install-neovim
      - task: install-lazyvim
      - bash install-php-tools.sh
      - task: configure

  install-deps:
    desc: "Install required dependencies"
    cmds:
      - sudo apt-get update -y
      - sudo apt-get install -y curl git wget unzip ripgrep fd-find xclip
    status:
      - which git
      - which curl
      - which rg

  install-lazygit:
    desc: "Install lazygit"
    cmds:
      - |
        LAZYGIT_VERSION=$(curl -s "https://api.github.com/repos/jesseduffield/lazygit/releases/latest" | grep tag_name | cut -d '"' -f 4 | cut -c 2-)
        wget -q "https://github.com/jesseduffield/lazygit/releases/download/v${LAZYGIT_VERSION}/lazygit_${LAZYGIT_VERSION}_Linux_x86_64.tar.gz" -O /tmp/lazygit.tar.gz
        tar -xzf /tmp/lazygit.tar.gz -C /tmp/
        sudo mv /tmp/lazygit /usr/local/bin/
        echo "lazygit installed $(lazygit --version)"
    status:
      - which lazygit

  install-neovim:
    desc: "Install latest Neovim"
    cmds:
      - wget -q https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz -O /tmp/nvim.tar.gz
      - sudo tar -xzf /tmp/nvim.tar.gz -C /opt/
      - sudo ln -sf /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim
      - echo "Neovim installed $(nvim --version | head -1)"
    status:
      - which nvim

  install-lazyvim:
    desc: "Install LazyVim"
    cmds:
      - |
        [ -d ~/.config/nvim ] && mv ~/.config/nvim ~/.config/nvim.bak.$(date +%s)
        [ -d ~/.local/share/nvim ] && mv ~/.local/share/nvim ~/.local/share/nvim.bak.$(date +%s)
        git clone https://github.com/LazyVim/starter ~/.config/nvim
        rm -rf ~/.config/nvim/.git
    status:
      - test -f ~/.config/nvim/init.lua

  configure:
    desc: "Configure encoding and IME"
    cmds:
      - mkdir -p ~/.config/nvim/lua/config
      - |
        cat >> ~/.config/nvim/lua/config/options.lua << 'EOF'

        -- 基本編碼設定
        vim.o.encoding = "utf-8"
        vim.o.fileencoding = "utf-8"

        -- Neovide 中文輸入支援
        if vim.g.neovide then
          vim.g.neovide_input_ime = true
        end
        EOF
    status:
      - grep -q 'neovide_input_ime' ~/.config/nvim/lua/config/options.lua

  install-php-tools:
    desc: "Hard-fix Phpactor with bridge scripts"
    cmds:
      # 建立橋接腳本，直接在生成時展開 DBX_PATH 避開執行期路徑問題
      - mkdir -p ~/.local/bin
      - |
        DBX_PATH=$(which distrobox)
        printf "#!/bin/bash\nexport DBX_CONTAINER_MANAGER=docker\n$DBX_PATH enter php-dev -- php \"\$@\"" > ~/.local/bin/php
        printf "#!/bin/bash\nexport DBX_CONTAINER_MANAGER=docker\n$DBX_PATH enter php-dev -- composer \"\$@\"" > ~/.local/bin/composer
        chmod +x ~/.local/bin/php ~/.local/bin/composer
      # 寫入 Neovim 插件配置
      - mkdir -p ~/.config/nvim/lua/plugins
      - |
        cat > ~/.config/nvim/lua/plugins/php.lua << 'EOF'
        return {
          {
            "phpactor/phpactor",
            build = "DBX_CONTAINER_MANAGER=docker " .. vim.fn.expand("$HOME") .. "/.local/bin/composer install --no-dev -o",
            ft = "php",
            config = function()
              vim.g.phpactor_php_bin = vim.fn.expand("$HOME") .. "/.local/bin/php"
              if pcall(require, "notify") then
                require("notify").setup({ timeout = 3000 })
              end
              vim.api.nvim_create_autocmd("FileType", {
                pattern = "php",
                callback = function()
                  local opts = { buffer = true, silent = true }
                  vim.keymap.set("n", "<leader>cu", "<cmd>PhpactorImportClass<cr>", { desc = "PHP Import Class", buffer = true })
                  vim.keymap.set("n", "<leader>cn", "<cmd>PhpactorContextMenu<cr>", { desc = "Phpactor Menu", buffer = true })
                end,
              })
            end,
          },
          {
            "akinsho/bufferline.nvim",
            opts = {
              options = {
                custom_filter = function(buf)
                  return vim.bo[buf].buftype ~= "terminal"
                end,
              },
            },
          },
        }
        EOF 
  clean:
    desc: "Reset all Neovim config"
    prompt: "This will delete all Neovim config. Are you sure?"
    cmds:
      - rm -rf ~/.config/nvim ~/.local/share/nvim ~/.local/state/nvim ~/.cache/nvim
      - echo "Cleared all config"

